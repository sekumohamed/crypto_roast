<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto Roast</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
    .warning-banner { background: repeating-linear-gradient(45deg, #ff2d2d, #ff2d2d 10px, #ff6b00 10px, #ff6b00 20px); width: 100%; max-width: 600px; padding: 8px; text-align: center; font-weight: 700; font-size: 13px; color: #000; margin-bottom: 24px; border-radius: 4px; }
    h1 { font-family: 'Bangers', cursive; font-size: 5rem; background: linear-gradient(135deg, #ff2d2d, #ff6b00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 4px; margin-bottom: 8px; }
    .subtitle { color: #888; margin-bottom: 32px; font-size: 0.95rem; }
    .wallet-btn { padding: 12px 24px; border-radius: 8px; border: 2px solid #ff6b00; background: transparent; color: #ff6b00; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 16px; transition: all 0.2s; }
    .wallet-btn:hover { background: #ff6b00; color: #000; }
    .wallet-btn.connected { border-color: #00ff88; color: #00ff88; font-size: 12px; }
    .input-row { display: flex; gap: 10px; width: 100%; max-width: 560px; margin-bottom: 32px; }
    input { flex: 1; padding: 12px 16px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: #fff; font-size: 14px; }
    input::placeholder { color: #555; }
    button.roast-btn { padding: 12px 24px; border-radius: 8px; border: none; background: #e84040; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; }
    button.roast-btn:hover { background: #c93333; }
    button.roast-btn:disabled { background: #555; cursor: not-allowed; }
    .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; width: 100%; max-width: 560px; overflow: hidden; display: none; }
    .card-header { background: #111; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #2a2a2a; }
    .card-title { font-size: 1rem; font-weight: 600; }
    .score-bar-wrap { width: 100%; max-width: 560px; display: none; margin-bottom: 16px; }
    .score-label { font-size: 13px; color: #888; margin-bottom: 6px; }
    .score-bar-bg { background: #222; border-radius: 99px; height: 10px; }
    .score-bar-fill { height: 10px; border-radius: 99px; background: linear-gradient(90deg, #ff2d2d, #ff6b00); width: 0%; transition: width 1.2s ease; }
    .score-badge { display: inline-block; background: #e84040; color: #fff; font-size: 13px; font-weight: 600; padding: 4px 12px; border-radius: 99px; }
    .card-body { padding: 20px; }
    .roast-line { border-left: 3px solid #e84040; padding: 8px 12px; margin-bottom: 10px; font-size: 14px; color: #ccc; line-height: 1.6; }
    .verdict { background: #1f0f0f; border-radius: 8px; padding: 12px 16px; font-size: 13px; color: #e84040; font-weight: 500; margin-top: 4px; }
    .share-btn { width: 100%; margin-top: 16px; padding: 10px; border-radius: 8px; border: 1px solid #333; background: transparent; color: #aaa; font-size: 13px; cursor: pointer; }
    .share-btn:hover { background: #222; }
    .error { color: #e84040; font-size: 14px; margin-top: 12px; }
    .loading { color: #888; font-size: 14px; margin-top: 12px; }
    .tx-badge { background: #0a2a1a; border: 1px solid #00ff88; color: #00ff88; font-size: 11px; padding: 4px 10px; border-radius: 99px; margin-bottom: 12px; display: none; }
  </style>
</head>
<body>
  <div class="warning-banner">⚠️ WARNING: BRUTAL HONESTY AHEAD ⚠️</div>
  <h1>CRYPTO ROAST</h1>
  <p class="subtitle">Your on-chain history. Judged. Ruthlessly.</p>

  <button class="wallet-btn" id="connectBtn" onclick="connectWallet()">🦊 Connect MetaMask</button>

  <div class="input-row">
    <input type="text" id="wallet" placeholder="0x... or connect MetaMask above" />
    <button class="roast-btn" id="roastBtn" onclick="getRoast()">Roast Me 🔥</button>
  </div>

  <p class="loading" id="loading" style="display:none">🔥 Analyzing your terrible decisions...</p>
  <p class="error" id="error" style="display:none"></p>
  <div class="tx-badge" id="txBadge">✅ Real on-chain data loaded</div>

  <div class="score-bar-wrap" id="scoreWrap">
    <div class="score-label">Degen Score</div>
    <div class="score-bar-bg"><div class="score-bar-fill" id="scoreFill"></div></div>
  </div>

  <div class="card" id="card">
    <div class="card-header">
      <span class="card-title" id="cardTitle"></span>
      <span class="score-badge" id="score"></span>
    </div>
    <div class="card-body">
      <div id="roasts"></div>
      <div class="verdict" id="verdict"></div>
      <button class="share-btn" onclick="shareOnX()">🐦 Share my roast on X</button>
      <button class="share-btn" id="memeBtn" onclick="generateMeme()" style="margin-top:8px; border-color:#ff6b00; color:#ff6b00;">🎨 Generate Meme Card</button>
      <canvas id="memeCanvas" style="display:none;"></canvas>
      <img id="memeImage" style="width:100%; border-radius:8px; margin-top:12px; display:none;" />
      <a id="memeDownload" style="display:none;"></a>
    </div>
  </div>

  <script>
    async function connectWallet() {
      if (typeof window.ethereum === 'undefined') {
        alert('MetaMask not found! Please install MetaMask extension.');
        return;
      }
      try {
        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        const account = accounts[0];
        document.getElementById('wallet').value = account;
        const btn = document.getElementById('connectBtn');
        btn.textContent = '✅ ' + account.slice(0,6) + '...' + account.slice(-4);
        btn.classList.add('connected');
      } catch (err) {
        console.error(err);
      }
    }

    async function getRoast() {
      const wallet = document.getElementById('wallet').value.trim();
      if (!wallet) { showError('Please enter a wallet address!'); return; }

      const btn = document.getElementById('roastBtn');
      btn.disabled = true;
      btn.textContent = 'Roasting...';
      document.getElementById('loading').style.display = 'block';
      document.getElementById('error').style.display = 'none';
      document.getElementById('card').style.display = 'none';
      document.getElementById('scoreWrap').style.display = 'none';
      document.getElementById('txBadge').style.display = 'none';

      try {
        const res = await fetch('/roast', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ wallet })
        });
        const data = await res.json();
        if (data.error) { showError(data.error); return; }
        showRoast(data);
      } catch (e) {
        showError('Something went wrong. Try again!');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Roast Me 🔥';
        document.getElementById('loading').style.display = 'none';
      }
    }

    function showRoast(data) {
      document.getElementById('cardTitle').textContent = data.title;
      document.getElementById('score').textContent = 'Degen Score: ' + data.degen_score + '/100';
      document.getElementById('verdict').textContent = data.verdict;
      const roastsEl = document.getElementById('roasts');
      const emojis = ['💀', '😂', '🪦', '🤡'];
      roastsEl.innerHTML = data.roasts.map((r, i) => `<div class="roast-line">${emojis[i]} ${r}</div>`).join('');
      document.getElementById('card').style.display = 'block';
      document.getElementById('scoreWrap').style.display = 'block';
      document.getElementById('txBadge').style.display = 'inline-block';
      setTimeout(() => {
        document.getElementById('scoreFill').style.width = data.degen_score + '%';
      }, 100);
    }

    function showError(msg) {
      const el = document.getElementById('error');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('loading').style.display = 'none';
    }

    function shareOnX() {
      const score = document.getElementById('score').textContent;
      const verdict = document.getElementById('verdict').textContent;
      const text = `I just got roasted by AI for my crypto trades! ${score}. "${verdict}" Try it: https://crypto-roast-rho.vercel.app #CryptoRoast #TuringTestHackathon #Mantle`;
      window.open('https://twitter.com/intent/tweet?text=' + encodeURIComponent(text));
    }

    document.getElementById('wallet').addEventListener('keypress', e => {
      if (e.key === 'Enter') getRoast();
    });

    // Helper for Rounded Rectangles
function roundRect(ctx, x, y, width, height, radius) {
  ctx.beginPath();
  ctx.moveTo(x + radius, y);
  ctx.lineTo(x + width - radius, y);
  ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
  ctx.lineTo(x + width, y + height - radius);
  ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
  ctx.lineTo(x + radius, y + height);
  ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
  ctx.lineTo(x, y + radius);
  ctx.quadraticCurveTo(x, y, x + radius, y);
  ctx.closePath();
}

// Helper for wrapping long roast text
function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const words = text.split(' ');
  let line = '';
  for (let n = 0; n < words.length; n++) {
    let testLine = line + words[n] + ' ';
    let metrics = ctx.measureText(testLine);
    if (metrics.width > maxWidth && n > 0) {
      ctx.fillText(line, x, y);
      line = words[n] + ' ';
      y += lineHeight;
    } else {
      line = testLine;
    }
  }
  ctx.fillText(line, x, y);
}
    function generateMeme() {
  const canvas = document.getElementById('memeCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = 1200;
  canvas.height = 630;

  // === BACKGROUND ===
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, 1200, 630);

  // Comic panel border - thick yellow
  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth = 12;
  ctx.strokeRect(6, 6, 1188, 618);

  // Inner border - red
  ctx.strokeStyle = '#ff2d2d';
  ctx.lineWidth = 4;
  ctx.strokeRect(18, 18, 1164, 594);

  // === COMIC HALFTONE DOTS background ===
  ctx.fillStyle = '#111111';
  for(let x = 0; x < 1200; x += 20) {
    for(let y = 0; y < 630; y += 20) {
      ctx.beginPath();
      ctx.arc(x, y, 2, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // === LEFT PANEL - crying figure ===
  // Body
  ctx.fillStyle = '#FFD700';
  ctx.fillRect(30, 180, 120, 300);
  // Head circle
  ctx.fillStyle = '#FFDAB9';
  ctx.beginPath();
  ctx.arc(90, 155, 45, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 3;
  ctx.stroke();
  // Eyes X X (crying)
  ctx.fillStyle = '#333';
  ctx.font = 'bold 22px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('😭', 90, 168);
  // Arms down (disappointed)
  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth = 10;
  ctx.beginPath(); ctx.moveTo(30, 220); ctx.lineTo(0, 310); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(150, 220); ctx.lineTo(180, 310); ctx.stroke();
  // Speech bubble
  ctx.fillStyle = '#ffffff';
  roundRect(ctx, 25, 80, 140, 55, 10); ctx.fill();
  ctx.strokeStyle = '#333'; ctx.lineWidth = 2; 
  roundRect(ctx, 25, 80, 140, 55, 10); ctx.stroke();
  ctx.fillStyle = '#ff2d2d';
  ctx.font = 'bold 11px Arial Black';
  ctx.textAlign = 'center';
  ctx.fillText('WHY DID I', 95, 100);
  ctx.fillText('NOT SELL??', 95, 118);
  // Bubble tail
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.moveTo(80, 135); ctx.lineTo(90, 155); ctx.lineTo(100, 135);
  ctx.fill();

  // === RIGHT PANEL - bear market bear ===
  ctx.fillStyle = '#8B4513';
  // Bear body
  ctx.beginPath();
  ctx.arc(1110, 280, 70, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#5D2E0C';
  ctx.lineWidth = 3;
  ctx.stroke();
  // Bear ears
  ctx.fillStyle = '#8B4513';
  ctx.beginPath(); ctx.arc(1075, 222, 22, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.arc(1145, 222, 22, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  // Bear face
  ctx.font = '40px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('🐻', 1110, 295);
  // BEAR MARKET badge
  ctx.fillStyle = '#ff2d2d';
  roundRect(ctx, 1048, 330, 124, 36, 6); ctx.fill();
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 14px Arial Black';
  ctx.fillText('BEAR MARKET', 1110, 354);
  // Bear claws
  ctx.strokeStyle = '#5D2E0C';
  ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(1048, 295); ctx.lineTo(1010, 330); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(1172, 295); ctx.lineTo(1195, 330); ctx.stroke();

  // === MAIN CENTER CARD ===
  // Card shadow
  ctx.fillStyle = '#ff2d2d';
  ctx.fillRect(208, 48, 790, 540);
  // Card background  
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(200, 40, 790, 540);
  // Card border
  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth = 4;
  ctx.strokeRect(200, 40, 790, 540);

  // === HEADER STRIPE ===
  ctx.fillStyle = '#ff2d2d';
  ctx.fillRect(200, 40, 790, 70);
  // Diagonal stripe pattern
  ctx.strokeStyle = '#cc0000';
  ctx.lineWidth = 8;
  for(let i = 200; i < 990; i += 30) {
    ctx.beginPath();
    ctx.moveTo(i, 40);
    ctx.lineTo(i + 30, 110);
    ctx.stroke();
  }

  // CRYPTO ROAST title
  ctx.fillStyle = '#FFD700';
  ctx.font = '900 52px Arial Black';
  ctx.textAlign = 'center';
  // Text shadow
  ctx.shadowColor = '#ff2d2d';
  ctx.shadowBlur = 10;
  ctx.fillText('🔥 CRYPTO ROAST 🔥', 595, 94);
  ctx.shadowBlur = 0;

  // === DEGEN SCORE BADGE ===
  ctx.fillStyle = '#FFD700';
  roundRect(ctx, 420, 118, 360, 48, 24); ctx.fill();
  ctx.strokeStyle = '#ff2d2d';
  ctx.lineWidth = 3;
  roundRect(ctx, 420, 118, 360, 48, 24); ctx.stroke();
  const score = document.getElementById('score').textContent;
  ctx.fillStyle = '#0a0a0a';
  ctx.font = 'bold 22px Arial Black';
  ctx.textAlign = 'center';
  ctx.fillText('⚡ ' + score.toUpperCase() + ' ⚡', 600, 150);

  // === ROAST TITLE ===
  const title = document.getElementById('cardTitle').textContent;
  ctx.fillStyle = '#ffffff';
  ctx.font = '900 34px Arial Black';
  ctx.textAlign = 'center';
  ctx.fillText('"' + title + '"', 595, 210);

  // Zigzag divider
  ctx.strokeStyle = '#ff2d2d';
  ctx.lineWidth = 3;
  ctx.beginPath();
  let zigX = 220;
  ctx.moveTo(zigX, 228);
  while(zigX < 960) {
    ctx.lineTo(zigX + 15, 218);
    ctx.lineTo(zigX + 30, 228);
    zigX += 30;
  }
  ctx.stroke();

  // === ROAST LINES ===
  const roastLines = document.querySelectorAll('.roast-line');
  const emojis = ['💀', '😂', '🪦', '🤡'];
  let y = 262;
  ctx.textAlign = 'left';

  roastLines.forEach((line, i) => {
    if (i >= 2) return;
    // Left accent bar
    ctx.fillStyle = '#ff2d2d';
    ctx.fillRect(218, y - 18, 5, 50);
    ctx.font = 'bold 15px Arial';
    ctx.fillStyle = '#cccccc';
    const text = emojis[i] + ' ' + line.textContent.replace(/^[^\s]+\s/, '');
    wrapText(ctx, text, 235, y, 720, 24);
    y += 65;
  });

  // === VERDICT BOX ===
  ctx.fillStyle = '#1f0808';
  roundRect(ctx, 218, y, 754, 85, 10); ctx.fill();
  ctx.strokeStyle = '#ff6b00';
  ctx.lineWidth = 3;
  roundRect(ctx, 218, y, 754, 85, 10); ctx.stroke();
  // Verdict label
  ctx.fillStyle = '#ff6b00';
  ctx.font = 'bold 13px Arial Black';
  ctx.textAlign = 'left';
  ctx.fillText('⚠️ FINAL VERDICT:', 235, y + 22);
  ctx.font = 'italic 14px Arial';
  ctx.fillStyle = '#ffaa44';
  const verdict = document.getElementById('verdict').textContent;
  wrapText(ctx, verdict, 235, y + 45, 720, 22);

  // === BOTTOM BAR ===
  ctx.fillStyle = '#111111';
  ctx.fillRect(200, 538, 790, 42);
  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(200, 538); ctx.lineTo(990, 538); ctx.stroke();

  // Wallet
  const wallet = document.getElementById('wallet').value;
  ctx.font = '12px Arial';
  ctx.fillStyle = '#666666';
  ctx.textAlign = 'left';
  ctx.fillText('👛 ' + wallet.slice(0,6) + '...' + wallet.slice(-4), 218, 564);

  // URL + tags
  ctx.font = 'bold 12px Arial';
  ctx.fillStyle = '#FFD700';
  ctx.textAlign = 'right';
  ctx.fillText('crypto-roast-rho.vercel.app', 975, 556);
  ctx.font = '11px Arial';
  ctx.fillStyle = '#ff6b00';
  ctx.fillText('#TuringTestHackathon #Mantle #CryptoRoast', 975, 572);

  // === BOTTOM DECORATIONS ===
  // Rocket bottom left
  ctx.font = '36px Arial';
  ctx.textAlign = 'left';
  ctx.fillText('🚀', 35, 580);
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 12px Arial Black';
  ctx.fillText('HODL', 38, 610);

  // Diamond bottom right
  ctx.font = '36px Arial';
  ctx.textAlign = 'right';
  ctx.fillText('💎', 1165, 580);
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 12px Arial Black';
  ctx.fillText('WAGMI?', 1162, 610);

  // Show and download
  const img = document.getElementById('memeImage');
  img.src = canvas.toDataURL('image/png');
  img.style.display = 'block';
  const link = document.getElementById('memeDownload');
  link.href = canvas.toDataURL('image/png');
  link.download = 'crypto-roast-' + Date.now() + '.png';
  link.click();
}
  </script>
</body>
</html>
