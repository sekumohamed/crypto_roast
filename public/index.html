<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto Roast</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
    .warning-banner { background: repeating-linear-gradient(45deg, #ff2d2d, #ff2d2d 10px, #ff6b00 10px, #ff6b00 20px); width: 100%; max-width: 600px; padding: 8px; text-align: center; font-weight: 700; font-size: 13px; color: #000; margin-bottom: 24px; border-radius: 4px; }
    h1 { font-family: 'Bangers', cursive; font-size: 5rem; background: linear-gradient(135deg, #ff2d2d, #ff6b00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 4px; margin-bottom: 8px; }
    .subtitle { color: #888; margin-bottom: 32px; font-size: 0.95rem; }
    .wallet-btn { padding: 12px 24px; border-radius: 8px; border: 2px solid #ff6b00; background: transparent; color: #ff6b00; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 16px; transition: all 0.2s; }
    .wallet-btn:hover { background: #ff6b00; color: #000; }
    .wallet-btn.connected { border-color: #00ff88; color: #00ff88; font-size: 12px; }
    .input-row { display: flex; gap: 10px; width: 100%; max-width: 560px; margin-bottom: 32px; }
    input { flex: 1; padding: 12px 16px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: #fff; font-size: 14px; }
    input::placeholder { color: #555; }
    button.roast-btn { padding: 12px 24px; border-radius: 8px; border: none; background: #e84040; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; }
    button.roast-btn:hover { background: #c93333; }
    button.roast-btn:disabled { background: #555; cursor: not-allowed; }
    .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; width: 100%; max-width: 560px; overflow: hidden; display: none; }
    .card-header { background: #111; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #2a2a2a; }
    .card-title { font-size: 1rem; font-weight: 600; }
    .score-bar-wrap { width: 100%; max-width: 560px; display: none; margin-bottom: 16px; }
    .score-label { font-size: 13px; color: #888; margin-bottom: 6px; }
    .score-bar-bg { background: #222; border-radius: 99px; height: 10px; }
    .score-bar-fill { height: 10px; border-radius: 99px; background: linear-gradient(90deg, #ff2d2d, #ff6b00); width: 0%; transition: width 1.2s ease; }
    .score-badge { display: inline-block; background: #e84040; color: #fff; font-size: 13px; font-weight: 600; padding: 4px 12px; border-radius: 99px; }
    .card-body { padding: 20px; }
    .roast-line { border-left: 3px solid #e84040; padding: 8px 12px; margin-bottom: 10px; font-size: 14px; color: #ccc; line-height: 1.6; }
    .verdict { background: #1f0f0f; border-radius: 8px; padding: 12px 16px; font-size: 13px; color: #e84040; font-weight: 500; margin-top: 4px; }
    .share-btn { width: 100%; margin-top: 16px; padding: 10px; border-radius: 8px; border: 1px solid #333; background: transparent; color: #aaa; font-size: 13px; cursor: pointer; }
    .share-btn:hover { background: #222; }
    .error { color: #e84040; font-size: 14px; margin-top: 12px; }
    .loading { color: #888; font-size: 14px; margin-top: 12px; }
    .tx-badge { background: #0a2a1a; border: 1px solid #00ff88; color: #00ff88; font-size: 11px; padding: 4px 10px; border-radius: 99px; margin-bottom: 12px; display: none; }
  </style>
</head>
<body>
  <div class="warning-banner">⚠️ WARNING: BRUTAL HONESTY AHEAD ⚠️</div>
  <h1>CRYPTO ROAST</h1>
  <p class="subtitle">Your on-chain history. Judged. Ruthlessly.</p>

  <button class="wallet-btn" id="connectBtn" onclick="connectWallet()">🦊 Connect MetaMask</button>

  <div class="input-row">
    <input type="text" id="wallet" placeholder="0x... or connect MetaMask above" />
    <button class="roast-btn" id="roastBtn" onclick="getRoast()">Roast Me 🔥</button>
  </div>

  <p class="loading" id="loading" style="display:none">🔥 Analyzing your terrible decisions...</p>
  <p class="error" id="error" style="display:none"></p>
  <div class="tx-badge" id="txBadge">✅ Real on-chain data loaded</div>

  <div class="score-bar-wrap" id="scoreWrap">
    <div class="score-label">Degen Score</div>
    <div class="score-bar-bg"><div class="score-bar-fill" id="scoreFill"></div></div>
  </div>

  <div class="card" id="card">
    <div class="card-header">
      <span class="card-title" id="cardTitle"></span>
      <span class="score-badge" id="score"></span>
    </div>
    <div class="card-body">
      <div id="roasts"></div>
      <div class="verdict" id="verdict"></div>
      <button class="share-btn" onclick="shareOnX()">🐦 Share my roast on X</button>
<button class="share-btn" id="memeBtn" onclick="generateMeme()" style="margin-top:8px; border-color:#ff6b00; color:#ff6b00;">🎨 Generate Meme Card</button>
<canvas id="memeCanvas" style="display:none;"></canvas>
<img id="memeImage" style="width:100%; border-radius:8px; margin-top:12px; display:none;" />
<a id="memeDownload" style="display:none;"></a>
    </div>
  </div>

  <script>
    async function connectWallet() {
      if (typeof window.ethereum === 'undefined') {
        alert('MetaMask not found! Please install MetaMask extension.');
        return;
      }
      try {
        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        const account = accounts[0];
        document.getElementById('wallet').value = account;
        const btn = document.getElementById('connectBtn');
        btn.textContent = '✅ ' + account.slice(0,6) + '...' + account.slice(-4);
        btn.classList.add('connected');
      } catch (err) {
        console.error(err);
      }
    }

    async function getRoast() {
      const wallet = document.getElementById('wallet').value.trim();
      if (!wallet) { showError('Please enter a wallet address!'); return; }

      const btn = document.getElementById('roastBtn');
      btn.disabled = true;
      btn.textContent = 'Roasting...';
      document.getElementById('loading').style.display = 'block';
      document.getElementById('error').style.display = 'none';
      document.getElementById('card').style.display = 'none';
      document.getElementById('scoreWrap').style.display = 'none';
      document.getElementById('txBadge').style.display = 'none';

      try {
        const res = await fetch('/roast', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ wallet })
        });
        const data = await res.json();
        if (data.error) { showError(data.error); return; }
        showRoast(data);
      } catch (e) {
        showError('Something went wrong. Try again!');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Roast Me 🔥';
        document.getElementById('loading').style.display = 'none';
      }
    }

    function showRoast(data) {
      document.getElementById('cardTitle').textContent = data.title;
      document.getElementById('score').textContent = 'Degen Score: ' + data.degen_score + '/100';
      document.getElementById('verdict').textContent = data.verdict;
      const roastsEl = document.getElementById('roasts');
      const emojis = ['💀', '😂', '🪦', '🤡'];
      roastsEl.innerHTML = data.roasts.map((r, i) => `<div class="roast-line">${emojis[i]} ${r}</div>`).join('');
      document.getElementById('card').style.display = 'block';
      document.getElementById('scoreWrap').style.display = 'block';
      document.getElementById('txBadge').style.display = 'inline-block';
      setTimeout(() => {
        document.getElementById('scoreFill').style.width = data.degen_score + '%';
      }, 100);
    }

    function showError(msg) {
      const el = document.getElementById('error');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('loading').style.display = 'none';
    }

    function shareOnX() {
      const score = document.getElementById('score').textContent;
      const verdict = document.getElementById('verdict').textContent;
      const text = `I just got roasted by AI for my crypto trades! ${score}. "${verdict}" Try it: https://crypto-roast-rho.vercel.app #CryptoRoast #TuringTestHackathon #Mantle`;
      window.open('https://twitter.com/intent/tweet?text=' + encodeURIComponent(text));
    }

    document.getElementById('wallet').addEventListener('keypress', e => {
      if (e.key === 'Enter') getRoast();
    });
    function generateMeme() {
  const canvas = document.getElementById('memeCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = 800;
  canvas.height = 450;

  // Background
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, 800, 450);

  // Warning stripes at top
  const stripeWidth = 30;
  for (let i = 0; i < 800; i += stripeWidth * 2) {
    ctx.fillStyle = '#ff2d2d';
    ctx.fillRect(i, 0, stripeWidth, 18);
    ctx.fillStyle = '#ff6b00';
    ctx.fillRect(i + stripeWidth, 0, stripeWidth, 18);
  }

  // Title
  ctx.font = 'bold 52px Arial Black';
  ctx.fillStyle = '#ff2d2d';
  ctx.textAlign = 'center';
  ctx.fillText('CRYPTO ROAST', 400, 80);

  // Degen score badge
  const score = document.getElementById('score').textContent;
  ctx.fillStyle = '#e84040';
  ctx.beginPath();
  ctx.roundRect(280, 95, 240, 40, 20);
  ctx.fill();
  ctx.font = 'bold 18px Arial';
  ctx.fillStyle = '#fff';
  ctx.fillText(score, 400, 122);

  // Title
  const title = document.getElementById('cardTitle').textContent;
  ctx.font = 'bold 28px Arial';
  ctx.fillStyle = '#ffffff';
  ctx.fillText(title, 400, 175);

  // Roast lines
  const roastLines = document.querySelectorAll('.roast-line');
  ctx.font = '16px Arial';
  ctx.fillStyle = '#cccccc';
  ctx.textAlign = 'left';
  
  let y = 210;
  if (roastLines.length > 0) {
    const firstRoast = roastLines[0].textContent;
    const words = firstRoast.split(' ');
    let line = '';
    for (let w of words) {
      const test = line + w + ' ';
      if (ctx.measureText(test).width > 680 && line !== '') {
        ctx.fillText(line, 60, y);
        line = w + ' ';
        y += 24;
      } else {
        line = test;
      }
    }
    ctx.fillText(line, 60, y);
    y += 32;
  }

  // Verdict
  const verdict = document.getElementById('verdict').textContent;
  ctx.fillStyle = '#e84040';
  ctx.font = 'italic 15px Arial';
  ctx.textAlign = 'center';
  // Word wrap verdict
  const vwords = verdict.split(' ');
  let vline = '';
  let vy = y + 20;
  for (let w of vwords) {
    const test = vline + w + ' ';
    if (ctx.measureText(test).width > 680 && vline !== '') {
      ctx.fillText(vline, 400, vy);
      vline = w + ' ';
      vy += 22;
    } else {
      vline = test;
    }
  }
  ctx.fillText(vline, 400, vy);

  // Bottom branding
  ctx.fillStyle = '#333';
  ctx.fillRect(0, 400, 800, 50);
  ctx.font = '14px Arial';
  ctx.fillStyle = '#888';
  ctx.textAlign = 'left';
  ctx.fillText('crypto-roast-rho.vercel.app', 30, 430);
  ctx.textAlign = 'right';
  ctx.fillStyle = '#ff6b00';
  ctx.fillText('#TuringTestHackathon #Mantle', 770, 430);

  // Show image
  const img = document.getElementById('memeImage');
  img.src = canvas.toDataURL('image/png');
  img.style.display = 'block';

  // Auto download
  const link = document.getElementById('memeDownload');
  link.href = canvas.toDataURL('image/png');
  link.download = 'crypto-roast-' + Date.now() + '.png';
  link.click();
}
  </script>
</body>
</html>
